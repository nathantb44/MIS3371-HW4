<html lang="en">
<head>
    <link rel="stylesheet" href="hw4.css"> <!-- This line links the CSS file -->

    <!--displays text in the browser's tab -->
    <title>Patient Registration Form | Nate's Neighborhood Vet</title>
    </head>
    <body>
    <header>
        <table width="100%">
            <tr>
                <td valign="top" align="left" width="20%">
                <div class="image">
                    <img align="center" src="Vet.png"alt="Nate's Neighborhood Vet Logo" width="70px" id="logo"/>
                </div>
                </td>

                <td>
                    <h2>Nate's Neighborhood Vet</h2>
                </td>

                <td valign="bottom" align="right" width="20%">
                    Today's Date: <span id="today"></span>
                </td>
            </tr>
        </table>
    </header>

    <hr>
    <center>
        <span id="welcome1"></span>
        <span id="welcome2"></span>
    </center>

    <div class="iframe-container">
        <iframe class="frame" src="https://www.houstonhumane.org/" frameborder="0"></iframe>
    </div>

    <hr>
    <!--Form starts here-->
<form name="signup-form" id="signup-form" action="thankyou.html">
    <center> 
        <div class="format">
            <table>
                <tr>
                    <th colspan="4"style="text-align:center;">Create patient account</th>
                </tr>
                <!-- Animal patient information-->
                <!-- Animals F M L name-->
                <tr>
                    <td class="td1"><label for="fname">First Name:</label></td>
                <td>
                    <input type="text"
                    name="fname"    
                    id="fname"  
                    maxlength="30"
                    title="Letters, apostrophes, and hyphens only"
                    pattern="[A-Za-z]{1,30}"
                    onblur="validateFname()"
                    required
                    placeholder="Nathan"
                    />
                <br>
                <span class="error" id="fnameError"></span>
                </td>
                </tr>
                <tr>
                    <td class="td1"><label for="mname">Middle Name:</label></td>
                <td>
                    <input type="text"
                    name="mname"    
                    id="mname"  
                    maxlength="1"
                    title="Letters only"
                    pattern="[A-Za-z]{0,1}"
                    onblur="validateMname()"
                    required
                    placeholder="T"
                    />
                <br>
                <span class="error" id="mnameError"></span>
                </td>
                </tr>
                <tr>
                    <td class="td1"><label for="lname">Last Name:</label></td>
                <td>
                    <input type="text"
                    name="lname"    
                    id="lname"  
                    maxlength="30"
                    title="Letters, apostrophes, and hyphens only"
                    pattern="[A-Za-z]{1,30}"
                    onblur="validateLname()"
                    required
                    placeholder="Bui"
                    />
                 <br>
                <span class="error" id="lnameError"></span>
                </td>
                </tr>

                <!--Gender or sex-->

                <tr>
                    <td class="td1"><label for="psex">Patient's Sex:</label></td>
                    <td>
                        <input 
                        type="radio"
                        id="s1"
                        name="psex"
                        value="Male"
                        />
                        Male

                        <input 
                        type="radio"
                        id="s2"
                        name="psex"
                        value="Female"
                        />
                        Female

                         <input 
                        type="radio"
                        id="s3"
                        name="psex"
                        value="Other"
                        />
                        other
                    </td>
                </tr>

                <!-- DOB -->

                <tr>
                    <td class="td1"><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input 
                        type="date"
                        id="dob"
                        name="dob"
                        onblur="validateDob()"
                        required
                        />
                <br>
                <span class="error" id="dobError"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ssn">SSN:</label></td>
                    <td>
                        <input 
                        type="password"
                        minlength="11"
                        maxlength="11"
                        name="ssn"
                        id="ssn"
                        required
                        title="Numbers only"
                        placeholder="000-46-9409"
                        onblur="validateSsn()"
                        />
                <br>
                <span class="error" id="ssnError"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th>
                </tr>
                
                <tr>
                    <th colspan="4"style="text-align:center;">Patient Information</th>
                </tr>

                <!--Address-->

                <tr>
                    <td class="td1"><label for="address1">Address:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="address1"
                        id="address1"
                        maxlength="30"
                        title="Please enter your address"
                        required
                        placeholder="1111 Beta ln"
                        onblur="validateAddress()"
                        />
                <br>
                <span class="error" id="address1-Error"></span>
                    </td>
                </tr>
                <tr>
                    <td class="td1"><label for="address2">Address:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="address2"
                        id="address2"
                        maxlength="30"
                        title="Please enter your address"
                        required
                        placeholder="1111 Gamma ln"
                        />
                    </td>
                </tr>

                <tr>
                    <tr>
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="city"
                        id="city"
                        maxlength="30"
                        title="Please enter your city"
                        required
                        placeholder="Houston"
                        onblur="validateCity()"
                        />
                        <br>
                        <span class="td1" id="city-error"></span>
                    </td>
                </tr>

                <!-- State -->
                <tr>
                    <td class="td1"><label for="state">State:</label></td>
                    <td>
                       <select>
                            <option selected disabled>Please select your state</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                       </select>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="zip">Zip Code:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="code"
                        id="zcode"
                        maxlength="5"
                        pattern="[0-9]{5}"
                        title="Numbers only"
                        required
                        placeholder="77498"
                        onblur="validateZcode"
                        />
                    </td>
                </tr>
                    
                 <tr>
                    <td class="td1"><label for="email">Email Address:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="email"
                        id="email"
                        maxlength="30"
                        title="Please enter your email address"
                        required
                        placeholder="billybob4@gmail.com"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-zA-Z]{2,20}$"
                        onblur="validateEmail()"
                        />
                <br>
                <span class="error" id="emailError"></span>
                    </td>
                </tr>

                 <tr>
                    <td class="td1"><label for="phone">Phone Number:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="phone number"
                        id="phone number"
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        required
                        maxlength="12"
                        title="Please enter your phone number"
                        required
                        placeholder="000-123-1234"
                        onblur="validatePhone()"
                        />
                <br>
                <span class="error" id="phoneError"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!-- spacing -->
                </tr>

                <!--Patient background -->

                <tr>
                    <th colspan="4"style="text-align:center;">Patient history</th>
                </tr>

                <tr>
                    <td class="td1"><label for="vac">Has patient been vaccinated:</label></td>
                    <td>
                        <input 
                        type="radio"
                        id="v1"
                        name="vaccinated"
                        value="Yes"
                        />
                        Yes

                        <input 
                        type="radio"
                        id="v2"
                        name="vaccinated"
                        value="No"
                        />
                        No
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ins">Does patient have insurance?:</label></td>
                    <td>
                        <input 
                        type="radio"
                        id="i1"
                        name="insurance"
                        value="Yes"
                        />
                        Yes

                        <input 
                        type="radio"
                        id="i2"
                        name="insurance"
                        value="No"
                        />
                        No
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="history">Has patient ever had?:</label></td>
                    <td>
                        <input type="checkbox" id="option1" value="Rabies"/>
                        <label for="rabies">Rabies</label><br>

                        <input type="checkbox" id="option2" value="Feline Lukemia"/>
                        <label for="feline-lukemia">Feline Lukemia</label><br>

                        <input type="checkbox" id="option3" value="Canine Influenza"/>
                        <label for="canine-influenza">Canine Influenza</label><br>

                        <input type="checkbox" id="option4" value="Kidney Failure"/>
                        <label for="kidney-failure">Kidney Failure</label><br>

                        <input type="checkbox" id="option5" value="Canine Parvovirus"/>
                        <label for="canine-parvovirus">Canine Parvovirus</label><br>
                </tr>

                <tr>
                    <td class="td1" align="right">
                        <label for="notes">If you have selected any of the above, <br>please explain:</label>
                    </td>
                    <td>
                        <textarea
                        rows="4"
                        cols="50"
                        maxlength="500"
                        id="notes"
                        name="notes"
                        title="Please state symptoms patient is experiencing"
                        placeholder="(Insert text here...)"
                        ></textarea>
                        <span id="description_text"></span>
                    </td>
                </tr>

                <!-- Slider HTML Coding-->
                <tr>
                    <td class="td1"><label for="range">Rate the pain level<br/>(range 0-10, 0 being no pain)</label></td>
                    <td>
                        <input 
                        type="range"
                        name="range"
                        id="range"
                        min="0"
                        max="10"
                        value="0"
                        />
                        <span id="range_slider"></span>
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th> <!-- spacing -->
                </tr>

                <!-- Patient login info-->

                <tr>
                    <th colspan="4" style="text-align: center;">Patient Account</th>
                </tr>

                <tr>
                    <td class="td1"><label for="username">User ID:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="username"
                        id="username"
                        minlength="5"
                        maxlength="15"
                        title="Username must contain at least 5 characters. Cannot start with number."
                        required
                        placeholder="SillyGoose123"
                        onblur="validateUname()" 
                        />
                <br>
                <span class="error" id="unameError"></span>
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="password">Password:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="password"
                        id="password"
                        minlength="10"
                        maxlength="30"
                        title="Password must contain at least 10 characters, including at least one uppercase letter, one lowercase letter, one number, and one special character"
                        required
                        placeholder="***********"
                        onblur="validatePword()"
                        oninput="validatePword()"
                        onfocus="validatePword()"
                        />
                <br>
                <span class="error" id="pwordError"></span>
                    </td>
                </tr>

                    <tr>
                        <td class="td1"><label for="confirm_password">Confirm Password:</label></td>
                        <td>
                            <input 
                            type="text"
                            name="confirm_password"
                            id="confirm_password"
                            minlength="10"
                            maxlength="30"
                            title="Please confirm your password"
                            required
                            placeholder="***********"
                            onblur="confirmPword()"
                            oninput="confirmPword()"
                            onfocus="confirmPword()"
                            />
                    <br>
                    <span class="error" id="confirmPwordError"></span>
                        </td>
                    </tr>

                    <tr>
                        <td class="td1"><label for="remember-me">Remember Me:</label>/td>
                        <td>
                            <input
                            type="checkbox"
                            name="remember-me"
                            id="remember-me"
                            checked
                            />
                        </td>
                    </tr>

                    <tr>
                         <td colspan="4" style="text-align: center;">
                        <center>
                            <input type="submit"name="submit" id="submit" style="font-family: 'Courier New', Courier, monospace;">
                            &nbsp;&nbsp;&nbsp;
                            <input type="button"name="review" id="review" value="Review" style="font-family: 'Courier New', Courier, monospace;" onclick="reviewInput()">
                             &nbsp;&nbsp;&nbsp;
                            <input type="button"name="validate" id="validate" value="validate" style="font-family: 'Courier New', Courier, monospace;" onclick="validateEverything()">
                        </center>
                        </td>
                    </tr>
            </table>
        </div>
        <div class="pword-message">
        <span id="msg1"></span><br/>
        <span id="msg2"></span><br/>
        <span id="msg3"></span><br/>
        <span id="msg4"></span><br/>
        <span id="msg5"></span><br/>
        <span id="msg6"></span><br/>
        <span id="msg7"></span><br/>
        <span id="pword2-error"></span><br/>
        </div>
        <center>    
            <p id="showInput"></p>
        </center>
    </div>
    </center>
    </form>

    <!--Footer goes here-->
    <iframe src="footer.html" width="100%" height="100px" title="footer"></iframe>
    <script src="hw4.js"></script>

<div id="alert-box">
    <div id="alert-content">
    <h4>Please Fill out all requirements information.</h4>
    <button id="close-alert">Ok </button>
    </div>
</div>
    </body>
</html>
